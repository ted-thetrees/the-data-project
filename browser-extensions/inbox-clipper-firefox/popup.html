<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    h3 {
      margin: 0 0 8px 0;
      color: #333;
    }
    .title {
      background: #f5f5f5;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      word-break: break-word;
      max-height: 60px;
      overflow: hidden;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #F46A54;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #e55a44; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    #status.success { display: block; background: #d4edda; color: #155724; }
    #status.error { display: block; background: #f8d7da; color: #721c24; }
    .setup-link {
      margin-top: 8px;
      font-size: 11px;
      text-align: center;
    }
    .setup-link a { color: #666; }
  </style>
</head>
<body>
  <h3>Save to Coda</h3>
  <div class="title" id="pageTitle">Loading...</div>
  <button id="saveBtn">Save to Inbox</button>
  <div id="status"></div>
  <div class="setup-link"><a href="#" id="optionsLink">Settings</a></div>
  <script src="popup.js"></script>
</body>
</html>
