<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>IFN · Circle Cascade</title>
<style>
  :root {
    --bg: #f6f6f4;
    --panel: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e3e3df;
    --accent: #1a1a1a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; color: var(--ink); background: var(--bg); }
  .app { display: grid; grid-template-columns: minmax(280px, 340px) 1fr; gap: 20px; padding: 20px; min-height: 100vh; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
  .stage { display: flex; align-items: flex-start; justify-content: center; }
  .phone {
    --asp: 1;   /* width/height ratio, updated from JS */
    height: min(85vh, 720px);
    width: calc(min(85vh, 720px) * var(--asp));
    max-width: 95vw;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,.06);
    overflow: hidden;
    position: relative;
  }
  svg { display: block; width: 100%; height: 100%; }
  h1 { font-size: 14px; margin: 0 0 4px; letter-spacing: .02em; }
  .sub { color: var(--muted); font-size: 11px; margin-bottom: 14px; }
  .group { margin-bottom: 12px; }
  .row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; margin-bottom: 4px; }
  .row label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .row .val { font-variant-numeric: tabular-nums; font-size: 11px; color: var(--ink); }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .btns { display: flex; gap: 8px; margin-top: 8px; }
  button {
    flex: 1; padding: 8px 10px; font: inherit; background: var(--ink); color: #fff;
    border: none; border-radius: 8px; cursor: pointer; letter-spacing: .02em;
  }
  button.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  button[disabled] { opacity: 0.4; cursor: not-allowed; }
  .seed { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--muted); margin-top: 6px; }
  details { margin-top: 10px; border-top: 1px solid var(--line); padding-top: 10px; }
  details summary { cursor: pointer; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  pre { font-size: 11px; background: #fafaf8; border: 1px solid var(--line); border-radius: 6px; padding: 8px; overflow: auto; max-height: 180px; margin: 8px 0 0; }
  .swatches { display: flex; gap: 6px; margin-top: 6px; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--line); cursor: pointer; }
  .swatch.active { outline: 2px solid var(--ink); outline-offset: 1px; }
  .toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink); }
  .preset-group { border: 1px solid var(--line); border-radius: 8px; padding: 10px; margin-bottom: 14px; background: #fafaf8; }
  .preset-select { width: 100%; padding: 7px 8px; font: inherit; border: 1px solid var(--line); border-radius: 6px; background: #fff; margin-bottom: 8px; }
  .preset-btns { display: flex; gap: 6px; }
  .preset-btns button { padding: 6px 8px; font-size: 11px; }
  .dirty-dot { color: #d97706; font-weight: 600; }
</style>
</head>
<body>
<div class="app">
  <aside class="panel">
    <h1>Circle Cascade</h1>
    <div class="sub">Empirical mode on · λ(y), R(y), g(r) measured from reference</div>

    <div class="preset-group">
      <div class="row">
        <label>Preset</label>
        <span class="val" id="preset-status"></span>
      </div>
      <select id="preset-select" class="preset-select"></select>
      <div class="preset-btns">
        <button class="ghost" id="preset-save">Save</button>
        <button class="ghost" id="preset-saveas">Save as…</button>
        <button class="ghost" id="preset-revert" disabled>Revert</button>
        <button class="ghost" id="preset-rename">Rename</button>
        <button class="ghost" id="preset-delete">Delete</button>
      </div>
    </div>

    <div class="group">
      <div class="row"><label>Count (N)</label><span class="val" id="v-n">161</span></div>
      <input id="s-n" type="range" min="10" max="400" value="161" step="1" />
    </div>
    <div class="group">
      <div class="row"><label>Width (H=400)</label><span class="val" id="v-w">400</span></div>
      <input id="s-w" type="range" min="200" max="800" value="400" step="10" />
    </div>
    <div class="group">
      <div class="row"><label>Falloff (k)</label><span class="val" id="v-k">2.3</span></div>
      <input id="s-k" type="range" min="1" max="6" value="2.3" step="0.1" />
    </div>
    <div class="group">
      <div class="row"><label>Size top (px)</label><span class="val" id="v-rt">20</span></div>
      <input id="s-rt" type="range" min="6" max="60" value="20" step="1" />
    </div>
    <div class="group">
      <div class="row"><label>Size bottom (px)</label><span class="val" id="v-rb">2</span></div>
      <input id="s-rb" type="range" min="1" max="24" value="2" step="1" />
    </div>
    <div class="group">
      <div class="row"><label>Size jitter</label><span class="val" id="v-sj">0.6</span></div>
      <input id="s-sj" type="range" min="0" max="0.8" value="0.6" step="0.02" />
    </div>
    <div class="group">
      <div class="row"><label>Gap (px)</label><span class="val" id="v-gap">0</span></div>
      <input id="s-gap" type="range" min="0" max="20" value="0" step="1" />
    </div>
    <div class="group">
      <div class="row"><label>Cluster bias</label><span class="val" id="v-cb">0.08</span></div>
      <input id="s-cb" type="range" min="0" max="0.8" value="0.08" step="0.02" />
    </div>
    <div class="group">
      <div class="row"><label>Horizontal noise</label><span class="val" id="v-hn">0.1</span></div>
      <input id="s-hn" type="range" min="0" max="1" value="0.1" step="0.02" />
    </div>
    <div class="group">
      <div class="row"><label>Fill opacity</label><span class="val" id="v-fa">0.85</span></div>
      <input id="s-fa" type="range" min="0.05" max="1" value="0.85" step="0.01" />
    </div>

    <div class="group">
      <label class="toggle"><input type="checkbox" id="s-outline" /> outline only</label>
    </div>
    <div class="group">
      <label class="toggle"><input type="checkbox" id="s-overlap" checked /> allow overlap</label>
    </div>
    <div class="group">
      <label class="toggle"><input type="checkbox" id="s-colored" checked /> color (palette from reference)</label>
    </div>
    <div class="group">
      <div class="row"><label>Algorithm</label></div>
      <select id="s-algorithm" class="preset-select" style="margin-bottom: 0">
        <option value="parametric">parametric (sliders above)</option>
        <option value="empirical-hardcore">empirical · hard-core</option>
        <option value="empirical-pcf">empirical · PCF-greedy</option>
        <option value="empirical-pcf-ot" selected>empirical · PCF + sliced-OT (best match)</option>
      </select>
    </div>

    <div class="btns">
      <button id="reroll">Reroll</button>
      <button class="ghost" id="copy">Copy params</button>
    </div>
    <div class="seed" id="seed">seed: —</div>

    <details>
      <summary>Params JSON</summary>
      <pre id="json"></pre>
    </details>
  </aside>

  <main class="stage">
    <div class="phone">
      <svg id="canvas" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </main>
</div>

<script>
// ---- seeded PRNG (mulberry32) ----
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = a;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ---- 1D value noise (cheap, ~Perlin feel) ----
function makeValueNoise1D(rng, octaves = 5) {
  const tables = [];
  for (let o = 0; o < octaves; o++) {
    const n = 4 << o;
    const arr = new Float32Array(n + 1);
    for (let i = 0; i < n; i++) arr[i] = rng() * 2 - 1;
    arr[n] = arr[0];
    tables.push(arr);
  }
  const smooth = t => t * t * (3 - 2 * t);
  return function(x) {
    let total = 0, amp = 1, norm = 0;
    for (let o = 0; o < octaves; o++) {
      const arr = tables[o];
      const n = arr.length - 1;
      const p = ((x % 1) + 1) % 1 * n;
      const i = Math.floor(p);
      const f = smooth(p - i);
      total += amp * (arr[i] * (1 - f) + arr[i + 1] * f);
      norm += amp;
      amp *= 0.5;
      x *= 2.03;
    }
    return total / norm; // ~[-1, 1]
  };
}

// ---- shared empirical samplers (λ(y), R(y)) ----
function makeEmpiricalSamplers(params) {
  const { seed, W, H } = params;
  const rng = mulberry32(seed);
  const nbins = EMPIRICAL.lambda_y.length;
  const edges = EMPIRICAL.y_edges;
  const cdf = EMPIRICAL_CDF;
  const meanR = EMPIRICAL.mean_r_y;
  const stdR = EMPIRICAL.std_r_y;
  const sx = W / EMPIRICAL.W;
  const sy = H / EMPIRICAL.H;
  const sScale = (sx + sy) / 2;

  const sampleY = () => {
    const u = rng();
    let idx = 0;
    while (idx < cdf.length - 1 && cdf[idx] < u) idx++;
    const lo = edges[idx], hi = edges[idx + 1];
    return (lo + rng() * (hi - lo)) * sy;
  };
  const gauss = () => Math.sqrt(-2 * Math.log(Math.max(rng(), 1e-9)))
                      * Math.cos(2 * Math.PI * rng());
  const sampleR = (cy) => {
    const t = Math.max(0, Math.min(0.9999, cy / H));
    const idx = Math.floor(t * nbins);
    let m = meanR[idx], s = stdR[idx];
    if (m === 0) { m = 4; s = 1.5; }
    let r = m + gauss() * s;
    return Math.max(1.5, Math.min(r, m + 3 * s)) * sScale;
  };
  return { rng, sampleY, sampleR, sScale };
}

// ---- PCF-greedy generator: best-candidate matching full g(r) target ----
// Reference: Öztireli & Gross 2012, "Analysis and Synthesis of Point Distributions
// based on Pair Correlation" — practical best-candidate variant.
function generateEmpiricalPCF(params) {
  const { N, W, H } = params;
  const candidatesPerStep = 15;
  const { rng, sampleY, sampleR, sScale } = makeEmpiricalSamplers(params);

  const targetG = EMPIRICAL.g;
  const gCenters = EMPIRICAL.g_r;
  const gBins = targetG.length;
  // reconstruct bin edges from centers (uniform binning)
  const gEdges = new Float64Array(gBins + 1);
  gEdges[0] = 0;
  for (let i = 0; i < gBins; i++) gEdges[i + 1] = 2 * gCenters[i] - gEdges[i];
  // scale to current canvas
  const gEdgesScaled = new Float64Array(gBins + 1);
  for (let i = 0; i <= gBins; i++) gEdgesScaled[i] = gEdges[i] * sScale;
  const shellArea = new Float64Array(gBins);
  for (let i = 0; i < gBins; i++) {
    shellArea[i] = Math.PI * (gEdgesScaled[i + 1] ** 2 - gEdgesScaled[i] ** 2);
  }
  // weight bins inversely by shell area so small-r bins (few pairs expected) matter more
  const weights = new Float64Array(gBins);
  let wSum = 0;
  for (let i = 0; i < gBins; i++) { weights[i] = 1 / (shellArea[i] + 1e-6); wSum += weights[i]; }
  for (let i = 0; i < gBins; i++) weights[i] /= wSum;

  const canvasArea = W * H;
  const rMaxSq = gEdgesScaled[gBins] * gEdgesScaled[gBins];
  const pairHist = new Float64Array(gBins);
  const circles = [];

  const errIf = (contrib, nPts) => {
    const norm = 0.5 * nPts * (nPts - 1);
    let e = 0;
    for (let i = 0; i < gBins; i++) {
      const g = norm > 0
        ? ((pairHist[i] + contrib[i]) / norm) / (shellArea[i] / canvasArea)
        : 0;
      const d = g - targetG[i];
      e += weights[i] * d * d;
    }
    return e;
  };

  const binOfDist = (d) => {
    // linear; gBins is 30 so this is fine
    for (let i = 0; i < gBins; i++) if (gEdgesScaled[i + 1] > d) return i;
    return -1;
  };

  let attempts = 0;
  const maxAttempts = N * 20;
  while (circles.length < N && attempts < maxAttempts) {
    attempts++;
    let best = null, bestErr = Infinity;
    const nPts = circles.length + 1;

    for (let ci = 0; ci < candidatesPerStep; ci++) {
      const cy = sampleY();
      const cx = rng() * W;
      const r = sampleR(cy);
      if (cx - r < 0 || cx + r > W || cy - r < 0 || cy + r > H) continue;

      const contrib = new Int32Array(gBins);
      for (const c of circles) {
        const dx = cx - c.cx, dy = cy - c.cy;
        const d2 = dx * dx + dy * dy;
        if (d2 >= rMaxSq) continue;
        const bin = binOfDist(Math.sqrt(d2));
        if (bin >= 0) contrib[bin]++;
      }
      const e = errIf(contrib, nPts);
      if (e < bestErr) {
        bestErr = e;
        best = { cx, cy, r, contrib };
      }
    }
    if (!best) continue;
    circles.push({ cx: best.cx, cy: best.cy, r: best.r });
    for (let i = 0; i < gBins; i++) pairHist[i] += best.contrib[i];
  }
  return { circles, attempts };
}

// ---- sliced OT refinement (Paulin et al. 2020) ----
// Iteratively projects synth and reference onto random 3-D directions (x, y, r)
// and nudges each synth point along the direction toward its sort-matched
// reference-projection target. Directly minimizes sliced Wasserstein distance.
function refineSlicedOT(circles, iterations, lr, seed, W, H) {
  const n = circles.length;
  if (n === 0) return circles;
  // Normalize axes so r is comparable to position
  let avgR = 0;
  for (const c of circles) avgR += c.r;
  avgR = avgR / n;
  const scaleX = W, scaleY = H, scaleR = avgR * 4 + 1e-6;

  // Build tiled reference cloud to cover the current viewport. Reference is
  // native at 400×400; for W > 400 we tile copies with horizontal offsets so
  // the OT target density matches the canvas; for W < 400 we compress x.
  const refFlat = REF_POINTS_FLAT;
  const refN = refFlat.length / 3;
  const REF_W = 400;
  const tiles = Math.max(1, Math.ceil(W / REF_W));
  const xScale = W < REF_W ? W / REF_W : 1;  // compress if narrower
  const tiledPts = [];
  for (let t = 0; t < tiles; t++) {
    const offset = t * REF_W;
    for (let k = 0; k < refN; k++) {
      const x = refFlat[k * 3    ] * xScale + offset;
      if (x > W) continue;  // past right edge of canvas
      const y = refFlat[k * 3 + 1];
      const r = refFlat[k * 3 + 2];
      tiledPts.push([x, y, r]);
    }
  }
  const tN = tiledPts.length;
  const rng = mulberry32(seed);
  // sample n points from tiled cloud (with replacement if n > tN)
  const refNorm = new Float64Array(n * 3);
  for (let i = 0; i < n; i++) {
    const k = Math.floor(rng() * tN);
    refNorm[i * 3    ] = tiledPts[k][0] / scaleX;
    refNorm[i * 3 + 1] = tiledPts[k][1] / scaleY;
    refNorm[i * 3 + 2] = tiledPts[k][2] / scaleR;
  }

  // Pack synth into normalized buffer
  const syn = new Float64Array(n * 3);
  for (let i = 0; i < n; i++) {
    syn[i * 3    ] = circles[i].cx / scaleX;
    syn[i * 3 + 1] = circles[i].cy / scaleY;
    syn[i * 3 + 2] = circles[i].r  / scaleR;
  }

  const sProj = new Float64Array(n);
  const rProj = new Float64Array(n);
  const sIdx = new Int32Array(n);
  const rIdx = new Int32Array(n);
  const target = new Float64Array(n);

  for (let it = 0; it < iterations; it++) {
    // random 3-D unit direction via normal sampling
    // Box-Muller x3
    let tx, ty, tz;
    {
      const u1 = Math.max(rng(), 1e-12), u2 = rng();
      const u3 = Math.max(rng(), 1e-12), u4 = rng();
      const u5 = Math.max(rng(), 1e-12), u6 = rng();
      tx = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
      ty = Math.sqrt(-2 * Math.log(u3)) * Math.cos(2 * Math.PI * u4);
      tz = Math.sqrt(-2 * Math.log(u5)) * Math.cos(2 * Math.PI * u6);
    }
    const norm = Math.sqrt(tx * tx + ty * ty + tz * tz) || 1;
    tx /= norm; ty /= norm; tz /= norm;

    for (let i = 0; i < n; i++) {
      sProj[i] = syn[i * 3] * tx + syn[i * 3 + 1] * ty + syn[i * 3 + 2] * tz;
      rProj[i] = refNorm[i * 3] * tx + refNorm[i * 3 + 1] * ty + refNorm[i * 3 + 2] * tz;
      sIdx[i] = i; rIdx[i] = i;
    }
    // sort both sets of indices by their projections
    sIdx.sort((a, b) => sProj[a] - sProj[b]);
    rIdx.sort((a, b) => rProj[a] - rProj[b]);
    // target[i] = rProj at matched rank
    for (let rank = 0; rank < n; rank++) {
      target[sIdx[rank]] = rProj[rIdx[rank]];
    }
    // apply update along theta
    for (let i = 0; i < n; i++) {
      const d = (target[i] - sProj[i]) * lr;
      syn[i * 3    ] += d * tx;
      syn[i * 3 + 1] += d * ty;
      syn[i * 3 + 2] += d * tz;
    }
  }

  // Unpack & clip
  const out = new Array(n);
  for (let i = 0; i < n; i++) {
    let cx = syn[i * 3    ] * scaleX;
    let cy = syn[i * 3 + 1] * scaleY;
    let r  = syn[i * 3 + 2] * scaleR;
    cx = Math.max(0, Math.min(W, cx));
    cy = Math.max(0, Math.min(H, cy));
    r  = Math.max(1.5, Math.min(20.0, r));
    out[i] = { cx, cy, r };
  }
  return out;
}

// PCF-greedy initialization + sliced-OT refinement
function generateEmpiricalPCFOT(params) {
  const { seed } = params;
  const base = generateEmpiricalPCF(params);
  const otIters = params.otIterations !== undefined ? params.otIterations : 500;
  const refined = refineSlicedOT(base.circles, otIters, 0.5, seed ^ 0x5A5A, params.W, params.H);
  return { circles: refined, attempts: base.attempts };
}

// ---- empirical generator (driven by measured λ, R, g) ----
function generateEmpirical(params) {
  const { N, seed, W, H } = params;
  const rng = mulberry32(seed);

  const nbins = EMPIRICAL.lambda_y.length;
  const edges = EMPIRICAL.y_edges;
  const cdf = EMPIRICAL_CDF;
  const meanR = EMPIRICAL.mean_r_y;
  const stdR = EMPIRICAL.std_r_y;
  const hardCore = EMPIRICAL.hard_core;
  const sx = W / EMPIRICAL.W;
  const sy = H / EMPIRICAL.H;

  // inverse-CDF sampler for λ(y)
  const sampleY = () => {
    const u = rng();
    let idx = 0;
    // linear search is fine for 40 bins
    while (idx < cdf.length - 1 && cdf[idx] < u) idx++;
    const lo = edges[idx], hi = edges[idx + 1];
    return (lo + rng() * (hi - lo)) * sy;
  };
  // Box-Muller normal
  const gauss = () => Math.sqrt(-2 * Math.log(Math.max(rng(), 1e-9)))
                      * Math.cos(2 * Math.PI * rng());
  const sampleR = (cy) => {
    const t = Math.max(0, Math.min(0.9999, cy / H));
    const idx = Math.floor(t * nbins);
    let m = meanR[idx], s = stdR[idx];
    if (m === 0) { m = 4; s = 1.5; }
    let r = m + gauss() * s;
    return Math.max(1.5, Math.min(r, m + 3 * s)) * ((sx + sy) / 2);
  };

  const circles = [];
  const hc = hardCore * ((sx + sy) / 2) * 0.85; // slight slack
  const hc2 = hc * hc;
  let attempts = 0;
  const maxAttempts = N * 500;
  while (circles.length < N && attempts < maxAttempts) {
    attempts++;
    const cy = sampleY();
    const cx = rng() * W;
    const r = sampleR(cy);
    if (cx - r < 0 || cx + r > W || cy - r < 0 || cy + r > H) continue;
    // PCF-derived rejection: no center closer than hard_core
    let ok = true;
    if (hc > 0) {
      for (const c of circles) {
        const dx = cx - c.cx, dy = cy - c.cy;
        if (dx * dx + dy * dy < hc2) { ok = false; break; }
      }
    }
    if (!ok) continue;
    circles.push({ cx, cy, r });
  }
  return { circles, attempts };
}

// ---- generator (parametric, slider-driven) ----
function generate(params) {
  const { N, falloff, sizeTop, sizeBot, sizeJitter, gap, clusterBias, hNoise, allowOverlap, seed, W, H } = params;
  const rng = mulberry32(seed);
  const xNoise = makeValueNoise1D(rng, 5);

  const circles = [];
  const maxAttempts = N * 400;
  let attempts = 0;

  const meanRAt = (cy) => {
    const t = Math.max(0, Math.min(1, cy / H));
    return sizeBot + (sizeTop - sizeBot) * Math.pow(1 - t, 1.6);
  };
  const densityAt = (cy) => {
    const t = Math.max(0, Math.min(1, cy / H));
    return Math.exp(-falloff * t);
  };
  const xWeightAt = (cx) => {
    // map noise [-1,1] -> [0,1], then ease toward 1 as hNoise -> 0
    const n = (xNoise(cx / W * 1.7) + 1) * 0.5;
    return 1 - hNoise + hNoise * n;
  };

  const overlaps = (cx, cy, r) => {
    if (allowOverlap) return false;
    for (const c of circles) {
      const dx = cx - c.cx, dy = cy - c.cy;
      const m = r + c.r + gap;
      if (dx * dx + dy * dy < m * m) return true;
    }
    return false;
  };

  while (circles.length < N && attempts < maxAttempts) {
    attempts++;
    let cx, cy, r;

    if (circles.length > 0 && rng() < clusterBias) {
      const parent = circles[Math.floor(rng() * circles.length)];
      const ang = rng() * Math.PI * 2;
      const dist = parent.r * (0.6 + rng() * 1.8) + gap;
      cx = parent.cx + Math.cos(ang) * dist;
      cy = parent.cy + Math.sin(ang) * dist;
      const mean = meanRAt(cy);
      r = Math.max(2, mean * (1 + (rng() * 2 - 1) * sizeJitter));
    } else {
      // sample (x,y) by rejection against D(y)*Xw(x)
      let ok = false, tries = 0;
      while (!ok && tries < 60) {
        tries++;
        cx = rng() * W;
        cy = rng() * H;
        if (rng() < densityAt(cy) * xWeightAt(cx)) ok = true;
      }
      if (!ok) continue;
      const mean = meanRAt(cy);
      r = Math.max(2, mean * (1 + (rng() * 2 - 1) * sizeJitter));
    }

    if (cx - r < 0 || cx + r > W || cy - r < 0 || cy + r > H) continue;
    if (overlaps(cx, cy, r)) continue;
    circles.push({ cx, cy, r });
  }
  return { circles, attempts };
}

function render() {
  const p = currentParams();
  $("v-n").textContent = p.N;
  $("v-w").textContent = p.W;
  $("v-k").textContent = p.falloff.toFixed(1);
  $("v-rt").textContent = p.sizeTop;
  $("v-rb").textContent = p.sizeBot;
  $("v-sj").textContent = p.sizeJitter.toFixed(2);
  $("v-gap").textContent = p.gap;
  $("v-cb").textContent = p.clusterBias.toFixed(2);
  $("v-hn").textContent = p.hNoise.toFixed(2);
  $("v-fa").textContent = p.fillAlpha.toFixed(2);

  // update viewBox + container aspect so the canvas actually resizes
  canvas.setAttribute("viewBox", `0 0 ${p.W} ${p.H}`);
  const phone = document.querySelector(".phone");
  if (phone) phone.style.setProperty("--asp", (p.W / p.H).toFixed(4));

  let genResult;
  if (p.algorithm === "empirical-pcf-ot") genResult = generateEmpiricalPCFOT(p);
  else if (p.algorithm === "empirical-pcf") genResult = generateEmpiricalPCF(p);
  else if (p.algorithm === "empirical-hardcore") genResult = generateEmpirical(p);
  else genResult = generate(p);
  const { circles, attempts } = genResult;
  out.circles = circles;
  $("seed").textContent = `seed: ${p.seed} · ${p.algorithm} · placed ${circles.length}/${p.N} (${attempts} attempts)`;

  const colorRng = mulberry32(p.seed ^ 0xA5A5);
  const pick = () => PALETTE[Math.floor(colorRng() * PALETTE.length)];
  const svg = circles.map(c => {
    const color = p.colored ? pick() : "#111";
    if (p.outline) {
      return `<circle cx="${c.cx.toFixed(2)}" cy="${c.cy.toFixed(2)}" r="${c.r.toFixed(2)}" fill="none" stroke="${color}" stroke-width="1.25"/>`;
    }
    return `<circle cx="${c.cx.toFixed(2)}" cy="${c.cy.toFixed(2)}" r="${c.r.toFixed(2)}" fill="${color}" fill-opacity="${p.fillAlpha.toFixed(2)}"/>`;
  }).join("");
  canvas.innerHTML = svg;

  const { outline, allowOverlap, colored, algorithm, ...jsonish } = p;
  $("json").textContent = JSON.stringify({ ...jsonish, outline, allowOverlap, colored, algorithm }, null, 2);
}

function loadPresetState() {
  try {
    const raw = localStorage.getItem(PRESET_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (Array.isArray(s.list) && s.list.length) return s;
    }
  } catch (e) {}
  return { list: STARTER_PRESETS.map(p => ({ ...p, params: { ...p.params } })),
           selected: STARTER_PRESETS[0].name };
}
function savePresetState() {
  localStorage.setItem(PRESET_KEY, JSON.stringify(presetState));
}

const presetState = loadPresetState();
let dirty = false;

function captureParams() {
  const p = { seed };
  for (const id in PARAM_MAP) {
    const spec = PARAM_MAP[id];
    const el = $(id);
    if (spec.type === "bool") p[spec.key] = el.checked;
    else if (spec.type === "string") p[spec.key] = el.value;
    else p[spec.key] = +el.value;
  }
  return p;
}
function applyParams(params) {
  // back-compat: old presets used `empirical: bool` instead of `algorithm: string`
  if (params.algorithm === undefined && params.empirical !== undefined) {
    params = { ...params, algorithm: params.empirical ? "empirical-hardcore" : "parametric" };
  }
  applying = true;
  if ("seed" in params) seed = params.seed;
  for (const id in PARAM_MAP) {
    const spec = PARAM_MAP[id];
    const v = params[spec.key];
    if (v === undefined) continue;
    const el = $(id);
    if (spec.type === "bool") el.checked = !!v;
    else el.value = v;
  }
  applying = false;
}
let applying = false;

function refreshPresetSelect() {
  const sel = $("preset-select");
  sel.innerHTML = "";
  for (const p of presetState.list) {
    const o = document.createElement("option");
    o.value = p.name;
    o.textContent = p.name;
    if (p.name === presetState.selected) o.selected = true;
    sel.appendChild(o);
  }
  updatePresetStatus();
}
function updatePresetStatus() {
  const el = $("preset-status");
  el.innerHTML = dirty ? '<span class="dirty-dot">● unsaved</span>' : "saved";
  $("preset-revert").disabled = !dirty;
}
function currentPreset() {
  return presetState.list.find(p => p.name === presetState.selected);
}
function markDirty() {
  if (applying) return;
  if (!dirty) { dirty = true; updatePresetStatus(); }
}

$("preset-select").addEventListener("change", e => {
  const name = e.target.value;
  if (dirty) {
    if (!confirm(`Discard unsaved changes to "${presetState.selected}"?`)) {
      e.target.value = presetState.selected;
      return;
    }
  }
  presetState.selected = name;

  const p = currentPreset();
  if (p) { applyParams(p.params); dirty = false; render(); updatePresetStatus(); }
});

  const name = prompt("Name this preset:", "");
  if (!name) return;
  const trimmed = name.trim();
  if (!trimmed) return;
  if (presetState.list.some(p => p.name === trimmed)) {
    if (!confirm(`"${trimmed}" already exists. Overwrite?`)) return;
    const existing = presetState.list.find(p => p.name === trimmed);
    existing.params = captureParams();
  } else {
    presetState.list.push({ name: trimmed, params: captureParams() });

  refreshPresetSelect();
  dirty = false;
  updatePresetStatus();
});

  const trimmed = name.trim();
  if (!trimmed || trimmed === p.name) return;
  if (presetState.list.some(x => x.name === trimmed)) {
    alert(`"${trimmed}" already exists.`);
    return;
  }
  p.name = trimmed;
  presetState.selected = trimmed;
  savePresetState();
  refreshPresetSelect();
});
$("preset-delete").addEventListener("click", () => {
  const p = currentPreset();
  if (!p) return;
  if (presetState.list.length <= 1) {
    alert("Can't delete the last preset.");
    return;
  }
  if (!confirm(`Delete preset "${p.name}"?`)) return;
  presetState.list = presetState.list.filter(x => x.name !== p.name);
  presetState.selected = presetState.list[0].name;
  savePresetState();
  const next = currentPreset();
  if (next) { applyParams(next.params); dirty = false; }
  refreshPresetSelect();
  render();
});

function flashBtn(id, label) {
  const b = $(id); const t = b.textContent;
  b.textContent = label; setTimeout(() => b.textContent = t, 900);
}

// --- input wiring: any change → dirty + re-render ---
["s-n","s-w","s-k","s-rt","s-rb","s-sj","s-gap","s-cb","s-hn","s-fa","s-outline","s-overlap","s-colored","s-algorithm"].forEach(id => {
  $(id).addEventListener("input", () => { markDirty(); render(); });
});
$("reroll").addEventListener("click", () => {
  seed = Math.floor(Math.random() * 1e9);
  markDirty();
  render();
});
$("copy").addEventListener("click", async () => {
  await navigator.clipboard.writeText($("json").textContent);
  flashBtn("copy", "copied");
});

// --- init: apply selected preset then first render ---
refreshPresetSelect();
const init = currentPreset();
if (init) applyParams(init.params);
dirty = false;
updatePresetStatus();
render();
</script>
</body>
</html>
